name: Download & Recompress Xiaomi ROM

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct URL for the Xiaomi FastBoot .tgz ROM"
        required: true
        type: string
      compression:
        description: "Compression algorithm"
        required: true
        default: "xz"
        type: choice
        options:
          - xz
          - zstd
          - bzip2

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /usr/share/dotnet &
          wait
          df -h

      - name: Install compression tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget pv xz-utils zstd pbzip2

      - name: Download ROM
        run: |
          echo "Downloading ROM..."
          wget --show-progress -q \
               --content-disposition \
               -O rom_original.tgz \
               "${{ github.event.inputs.rom_url }}"
          ORIG_SIZE=$(du -sh rom_original.tgz | cut -f1)
          echo "Original size: $ORIG_SIZE"
          echo "ORIG_SIZE=$ORIG_SIZE" >> $GITHUB_ENV
          ROM_NAME=$(basename "${{ github.event.inputs.rom_url }}" .tgz)
          echo "ROM_NAME=$ROM_NAME" >> $GITHUB_ENV

      - name: Extract ROM
        run: |
          echo "Extracting..."
          mkdir -p rom_extracted
          pv rom_original.tgz | tar -xz -C rom_extracted
          rm -f rom_original.tgz
          df -h

      - name: Recompress (xz)
        if: ${{ github.event.inputs.compression == 'xz' }}
        run: |
          echo "Repacking with xz -9 multi-thread..."
          tar -c -C rom_extracted . | xz -9 -T0 > "${{ env.ROM_NAME }}_xz9.tar.xz"
          NEW_SIZE=$(du -sh "${{ env.ROM_NAME }}_xz9.tar.xz" | cut -f1)
          echo "New size: $NEW_SIZE  (was ${{ env.ORIG_SIZE }})"
          echo "OUTPUT_FILE=${{ env.ROM_NAME }}_xz9.tar.xz" >> $GITHUB_ENV

      - name: Recompress (zstd)
        if: ${{ github.event.inputs.compression == 'zstd' }}
        run: |
          echo "Repacking with zstd --ultra -22..."
          THREADS=$(nproc)
          tar -c -C rom_extracted . \
            | zstd --ultra -22 -T$THREADS \
            > "${{ env.ROM_NAME }}_zst22.tar.zst"
          NEW_SIZE=$(du -sh "${{ env.ROM_NAME }}_zst22.tar.zst" | cut -f1)
          echo "New size: $NEW_SIZE  (was ${{ env.ORIG_SIZE }})"
          echo "OUTPUT_FILE=${{ env.ROM_NAME }}_zst22.tar.zst" >> $GITHUB_ENV

      - name: Recompress (bzip2)
        if: ${{ github.event.inputs.compression == 'bzip2' }}
        run: |
          echo "Repacking with pbzip2 -9..."
          tar -c -C rom_extracted . | pbzip2 -9 > "${{ env.ROM_NAME }}_bz9.tar.bz2"
          NEW_SIZE=$(du -sh "${{ env.ROM_NAME }}_bz9.tar.bz2" | cut -f1)
          echo "New size: $NEW_SIZE  (was ${{ env.ORIG_SIZE }})"
          echo "OUTPUT_FILE=${{ env.ROM_NAME }}_bz9.tar.bz2" >> $GITHUB_ENV

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "rom-${{ github.run_number }}"
          name: "ROM Build #${{ github.run_number }} - ${{ env.ROM_NAME }}"
          body: |
            ## Xiaomi FastBoot ROM (Recompressed)
            | Field      | Value |
            |-----------|-------|
            | Original  | ${{ env.ORIG_SIZE }} |
            | Algorithm | ${{ github.event.inputs.compression }} |
            | Source    | ${{ github.event.inputs.rom_url }} |
          files: ${{ env.OUTPUT_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
