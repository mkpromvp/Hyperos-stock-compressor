name: Download & Recompress Xiaomi ROM

on:
  workflow_dispatch:
    inputs:
      rom_url:
        description: "Direct URL for the Xiaomi FastBoot .tgz ROM"
        required: true
        type: string
      compression:
        description: "Compression algorithm"
        required: true
        default: "xz"
        type: choice
        options:
          - xz
          - xz-extreme
          - zstd
          - 7zip

jobs:
  compress:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Free disk space
        run: |
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /usr/share/dotnet &
          wait
          df -h

      - name: Install compression tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            wget pv xz-utils zstd pbzip2 p7zip-full

      - name: Download ROM
        run: |
          echo "Downloading ROM..."
          wget --show-progress -q \
               --content-disposition \
               -O rom_original.tgz \
               "${{ github.event.inputs.rom_url }}"
          ORIG_SIZE=$(du -sh rom_original.tgz | cut -f1)
          echo "Original size: $ORIG_SIZE"
          echo "ORIG_SIZE=$ORIG_SIZE" >> $GITHUB_ENV
          ROM_NAME=$(basename "${{ github.event.inputs.rom_url }}" .tgz)
          echo "ROM_NAME=$ROM_NAME" >> $GITHUB_ENV

      - name: Extract ROM
        run: |
          echo "Extracting..."
          mkdir -p rom_extracted
          pv rom_original.tgz | tar -xz -C rom_extracted
          rm -f rom_original.tgz
          echo "Contents:"
          ls -lh rom_extracted/
          df -h

      - name: Verify extracted files
        run: |
          echo "Checking .img files integrity..."
          find rom_extracted -name "*.img" | while read f; do
            SIZE=$(du -sh "$f" | cut -f1)
            echo "OK: $f ($SIZE)"
          done

      # ── xz standard ───────────────────────────────────────────────────────
      - name: Recompress (xz)
        if: ${{ github.event.inputs.compression == 'xz' }}
        run: |
          echo "Repacking with xz -9 -T0..."
          tar -c -C rom_extracted . | xz -9 -T0 > "${{ env.ROM_NAME }}.tar.xz"
          NEW_SIZE=$(du -sh "${{ env.ROM_NAME }}.tar.xz" | cut -f1)
          echo "New size: $NEW_SIZE  (was ${{ env.ORIG_SIZE }})"
          echo "OUTPUT_FILE=${{ env.ROM_NAME }}.tar.xz" >> $GITHUB_ENV

      # ── xz extreme (أقصى ضغط بدون 7zip) ──────────────────────────────────
      - name: Recompress (xz-extreme)
        if: ${{ github.event.inputs.compression == 'xz-extreme' }}
        run: |
          echo "Repacking with xz -9e -T0 (extreme)..."
          tar -c -C rom_extracted . | xz -9e -T0 > "${{ env.ROM_NAME }}_extreme.tar.xz"
          NEW_SIZE=$(du -sh "${{ env.ROM_NAME }}_extreme.tar.xz" | cut -f1)
          echo "New size: $NEW_SIZE  (was ${{ env.ORIG_SIZE }})"
          echo "OUTPUT_FILE=${{ env.ROM_NAME }}_extreme.tar.xz" >> $GITHUB_ENV

      # ── zstd ──────────────────────────────────────────────────────────────
      - name: Recompress (zstd)
        if: ${{ github.event.inputs.compression == 'zstd' }}
        run: |
          echo "Repacking with zstd --ultra -22..."
          THREADS=$(nproc)
          tar -c -C rom_extracted . \
            | zstd --ultra -22 -T$THREADS \
            > "${{ env.ROM_NAME }}.tar.zst"
          NEW_SIZE=$(du -sh "${{ env.ROM_NAME }}.tar.zst" | cut -f1)
          echo "New size: $NEW_SIZE  (was ${{ env.ORIG_SIZE }})"
          echo "OUTPUT_FILE=${{ env.ROM_NAME }}.tar.zst" >> $GITHUB_ENV

      # ── 7zip LZMA2 ultra (أقصى ضغط ممكن) ─────────────────────────────────
      - name: Recompress (7zip)
        if: ${{ github.event.inputs.compression == '7zip' }}
        run: |
          echo "Repacking with 7zip LZMA2 ultra..."
          # -mmt = كل الـ threads
          # -mx=9 = أقصى ضغط
          # -mfb=273 = أكبر word size
          # -md=1536m = أكبر dictionary ممكن على الـ runner
          # -ms=on = solid archive (بيضغط الملفات مع بعض)
          7za a -t7z \
              -m0=lzma2 \
              -mx=9 \
              -mfb=273 \
              -md=1536m \
              -ms=on \
              -mmt=on \
              "${{ env.ROM_NAME }}_ultra.7z" \
              ./rom_extracted/*
          NEW_SIZE=$(du -sh "${{ env.ROM_NAME }}_ultra.7z" | cut -f1)
          echo "New size: $NEW_SIZE  (was ${{ env.ORIG_SIZE }})"
          echo "OUTPUT_FILE=${{ env.ROM_NAME }}_ultra.7z" >> $GITHUB_ENV

      # ── تحقق من سلامة الملف المضغوط قبل الرفع ────────────────────────────
      - name: Verify compressed file
        run: |
          echo "Verifying output file..."
          case "${{ github.event.inputs.compression }}" in
            xz|xz-extreme)
              xz --test "${{ env.OUTPUT_FILE }}" && echo "XZ file is valid"
              ;;
            zstd)
              zstd --test "${{ env.OUTPUT_FILE }}" && echo "ZSTD file is valid"
              ;;
            7zip)
              7za t "${{ env.OUTPUT_FILE }}" && echo "7z file is valid"
              ;;
          esac

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "rom-${{ github.run_number }}"
          name: "ROM Build #${{ github.run_number }} - ${{ env.ROM_NAME }}"
          body: |
            ## Xiaomi FastBoot ROM (Recompressed)
            | Field      | Value |
            |-----------|-------|
            | Original  | ${{ env.ORIG_SIZE }} |
            | Algorithm | ${{ github.event.inputs.compression }} |
            | Source    | ${{ github.event.inputs.rom_url }} |
          files: ${{ env.OUTPUT_FILE }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
